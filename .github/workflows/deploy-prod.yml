name: 🚀 Deploy to PRODUCTION (redber.in)

on:
  push:
    branches: [main, deploy/whatsapp-voice-fixes]
  workflow_dispatch:                # allow manual trigger from GitHub UI

# Cancel any in-progress deployment on the same branch
concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Backend → api.redber.in
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: 🐍 Backend → api.redber.in
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 SSH into VPS and deploy backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            APP_DIR="/home/${{ secrets.CP_BACKEND_PROD_USER }}/htdocs/api.redber.in"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            echo "📦 Syncing repo (main branch)..."
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/${{ github.repository }}.git
            fi
            git fetch origin main
            git reset --hard origin/main

            echo "🐍 Installing Python deps..."
            cd backend
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip -q
            pip install -r requirements.txt -q

            echo "🔑 Writing .env for PRODUCTION..."
            printf 'SUPABASE_URL=%s\n'             "${{ secrets.SUPABASE_URL }}"           > .env
            printf 'SUPABASE_KEY=%s\n'             "${{ secrets.SUPABASE_KEY }}"           >> .env
            printf 'OPENAI_API_KEY=%s\n'           "${{ secrets.OPENAI_API_KEY }}"         >> .env
            printf 'DEEPGRAM_API_KEY=%s\n'         "${{ secrets.DEEPGRAM_API_KEY }}"       >> .env
            printf 'RESEND_API_KEY=%s\n'           "${{ secrets.RESEND_API_KEY }}"         >> .env
            printf 'ADMIN_FROM_EMAIL=%s\n'         "${{ secrets.ADMIN_FROM_EMAIL }}"       >> .env
            printf 'ELEVENLABS_API_KEY=%s\n'       "${{ secrets.ELEVENLABS_API_KEY }}"     >> .env
            printf 'FIREBASE_SERVICE_ACCOUNT=%s\n' "$(echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' | tr -d '\n')" >> .env
            printf 'WHATSAPP_ACCESS_TOKEN=%s\n'    "${{ secrets.WHATSAPP_ACCESS_TOKEN }}"  >> .env
            printf 'WHATSAPP_PHONE_NUMBER_ID=%s\n' "${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}" >> .env
            printf 'WHATSAPP_VERIFY_TOKEN=%s\n'    "${{ secrets.WHATSAPP_VERIFY_TOKEN }}"  >> .env
            printf 'WHATSAPP_DEFAULT_BOT_ID=%s\n'  "${{ secrets.WHATSAPP_DEFAULT_BOT_ID }}" >> .env

            echo "♻️  Restarting backend via PM2..."
            pm2 delete redber-backend-prod 2>/dev/null || true
            pm2 delete redber-backend 2>/dev/null || true
            pm2 start "venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 9090" \
              --name redber-backend-prod \
              --cwd "$(pwd)"
            pm2 save

            echo "✅ Backend PROD deployed to api.redber.in"

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Frontend → redber.in (runs after backend)
  # ─────────────────────────────────────────────────────────────
  deploy-frontend:
    name: ⚡ Frontend → redber.in
    runs-on: ubuntu-latest
    needs: deploy-backend           # ensure backend is up before FE build

    steps:
      - name: 🚀 SSH into VPS and deploy frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            APP_DIR="/home/${{ secrets.CP_FRONTEND_PROD_USER }}/htdocs/redber.in"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            echo "📦 Syncing repo (main branch)..."
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/${{ github.repository }}.git
            fi
            git fetch origin main
            git reset --hard origin/main

            echo "📦 Installing Node dependencies..."
            cd frontend
            rm -f ../package-lock.json || true
            rm -f ../yarn.lock || true
            npm ci --prefer-offline -q

            echo "🛑 Stopping PM2 and relocating old build..."
            pm2 delete redber-frontend-prod 2>/dev/null || true
            # mv works even on root-owned dirs because parent dir is user-owned
            mv .next "/tmp/next-old-$$" 2>/dev/null || true

            echo "🏗️  Building Next.js for PRODUCTION (fresh .next)..."
            NEXT_PUBLIC_API_URL=https://api.redber.in npm run build

            echo "♻️  Starting frontend via PM2..."
            pm2 start "npm run start -- --port 4000" \
              --name redber-frontend-prod \
              --cwd "$(pwd)"
            pm2 save

            # Clean up old root-owned build in the background
            rm -rf "/tmp/next-old-$$" &

            echo "✅ Frontend PROD deployed to redber.in"

