name: 🚀 Deploy to PRODUCTION (redber.in)

on:
  push:
    branches: [main]
  workflow_dispatch:                # allow manual trigger from GitHub UI

# Cancel any in-progress deployment on the same branch
concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Backend → api.redber.in
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: 🐍 Backend → api.redber.in
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 SSH into VPS and deploy backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.CP_BACKEND_PROD_USER }}  # CloudPanel site user for api.redber.in
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            APP_DIR="/home/${{ secrets.CP_BACKEND_PROD_USER }}/htdocs/api.redber.in"
            cd "$APP_DIR"

            echo "📦 Pulling latest code from main branch..."
            if [ ! -d ".git" ]; then
              git clone -b main https://github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            echo "🐍 Installing Python deps..."
            cd backend
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip -q
            pip install -r requirements.txt -q

            echo "🔑 Writing .env for PRODUCTION..."
            cat > .env << 'EOF'
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            DEEPGRAM_API_KEY=${{ secrets.DEEPGRAM_API_KEY }}
            FIREBASE_SERVICE_ACCOUNT=${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
            EOF

            echo "♻️  Restarting backend via PM2..."
            if pm2 list | grep -q redber-backend; then
              pm2 restart redber-backend
            else
              pm2 start "venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000" \
                --name redber-backend \
                --cwd "$(pwd)"
              pm2 save
            fi

            echo "✅ Backend PROD deployed to api.redber.in"

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Frontend → redber.in (runs after backend)
  # ─────────────────────────────────────────────────────────────
  deploy-frontend:
    name: ⚡ Frontend → redber.in
    runs-on: ubuntu-latest
    needs: deploy-backend           # ensure backend is up before FE build

    steps:
      - name: 🚀 SSH into VPS and deploy frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.CP_FRONTEND_PROD_USER }} # CloudPanel site user for redber.in
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            APP_DIR="/home/${{ secrets.CP_FRONTEND_PROD_USER }}/htdocs/redber.in"
            cd "$APP_DIR"

            echo "📦 Pulling latest code from main branch..."
            if [ ! -d ".git" ]; then
              git clone -b main https://github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            echo "📦 Installing Node dependencies..."
            cd frontend
            npm ci --prefer-offline -q

            echo "🏗️  Building Next.js for PRODUCTION..."
            NEXT_PUBLIC_API_URL=https://api.redber.in npm run build

            echo "♻️  Restarting frontend via PM2..."
            if pm2 list | grep -q redber-frontend; then
              pm2 restart redber-frontend
            else
              pm2 start "npm run start" \
                --name redber-frontend \
                --cwd "$(pwd)"
              pm2 save
            fi

            echo "✅ Frontend PROD deployed to redber.in"
