name: 🚀 Deploy to CloudPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Deploy FastAPI Backend
  # ─────────────────────────────────────────────
  deploy-backend:
    name: 🐍 Backend (api.kakkashi.cloud)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}  # e.g., 31.97.67.30
          username: ${{ secrets.CP_BACKEND_USER }} # CloudPanel site user (e.g., api-kakkashi)
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            # Define the path used by CloudPanel
            APP_DIR="/home/${{ secrets.CP_BACKEND_USER }}/htdocs/api.kakkashi.cloud"
            
            echo "📦 Pulling latest code..."
            cd $APP_DIR

            # If it's a new site, git clone first or just fetch
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            echo "🐍 Installing Python dependencies..."
            cd backend
            # CloudPanel Python Apps often use virtual environments automatically or you use one
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            # Ensure pip is up to date
            pip install --upgrade pip --quiet
            pip install -r requirements.txt --quiet

            echo "🔑 Writing .env..."
            cat > .env << 'ENVEOF'
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            ENVEOF

            echo "♻️ Restarting backend service..."
            # Depending on if you're using PM2 or CloudPanel Native Python (Passenger)
            if pm2 status | grep -q persona-backend; then
                pm2 restart persona-backend || pm2 start "venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000" --name persona-backend
                pm2 save
            else
                # If using Passenger (Native CloudPanel Python App)
                echo "Triggering Phusion Passenger restart..."
                mkdir -p ../tmp
                touch ../tmp/restart.txt
            fi

            echo "✅ Backend deployed on CloudPanel!"

  # ─────────────────────────────────────────────
  # JOB 2: Build & Deploy Next.js Frontend
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: ⚡ Frontend (kakkashi.cloud)
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Deploy built frontend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.CP_FRONTEND_USER }} # CloudPanel site user (e.g., kakkashi-user)
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            APP_DIR="/home/${{ secrets.CP_FRONTEND_USER }}/htdocs/kakkashi.cloud"
            
            echo "⚡ Pulling latest frontend code..."
            cd $APP_DIR

            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            echo "📦 Installing dependencies on server..."
            cd frontend
            npm ci --prefer-offline --quiet

            echo "🏗️  Building production bundle..."
            # Using the live api endpoint
            NEXT_PUBLIC_API_URL=https://api.kakkashi.cloud npm run build

            echo "♻️  Restarting frontend service..."
            # For a CloudPanel NodeJS App using PM2
            # Restart via pm2
            if command -v pm2 &> /dev/null; then
              pm2 restart persona-frontend || pm2 start "npm run start" --name persona-frontend
              pm2 save
            else
              echo "Error: PM2 not found. Please install PM2 or start manually."
              exit 1
            fi

            # Optionally, you can also use clpctl to restart the Node.js service if strictly integrated:
            # sudo clpctl service:restart --name=nodejs-YOUR_SERVICE_NAME 

            echo "✅ Frontend deployed on CloudPanel!"
