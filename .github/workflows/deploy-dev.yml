name: 🧪 Deploy to DEV (dev.redber.in)

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

# ─── User/path config ──────────────────────────────────────────────────────────
# CP_BACKEND_DEV_USER = redber-api-dev
# CP_FRONTEND_DEV_USER = redber-dev
# Both sites must be created in CloudPanel first so htdocs dirs exist.
# We SSH as root (VPS_SSH_KEY) so no per-user SSH key setup is needed.
# ───────────────────────────────────────────────────────────────────────────────

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Backend → api.dev.redber.in (port 7090)
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: 🐍 Backend → api.dev.redber.in
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Deploy backend via SSH (as root)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            SITE_USER="redber-api-dev"
            APP_DIR="/home/$SITE_USER/htdocs/api.dev.redber.in"

            echo "📦 Cloning or updating repo (dev branch)..."
            mkdir -p "$APP_DIR"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone -b dev https://github.com/${{ github.repository }}.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin dev
            git reset --hard origin/dev
            chown -R "$SITE_USER:$SITE_USER" "$APP_DIR"

            echo "🐍 Setting up Python environment..."
            cd backend
            if [ ! -d "venv" ]; then
              sudo -u "$SITE_USER" python3 -m venv venv
            fi
            sudo -u "$SITE_USER" bash -c "
              source venv/bin/activate
              pip install --upgrade pip -q
              pip install -r requirements.txt -q
            "

            echo "🔑 Writing .env..."
            sudo -u "$SITE_USER" tee .env > /dev/null << 'ENVEOF'
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            DEEPGRAM_API_KEY=${{ secrets.DEEPGRAM_API_KEY }}
            FIREBASE_SERVICE_ACCOUNT=${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
            ENVEOF

            echo "♻️  Restarting backend (port 7090)..."
            if pm2 list | grep -q "redber-backend-dev"; then
              pm2 restart redber-backend-dev
            else
              pm2 start "venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 7090" \
                --name redber-backend-dev \
                --cwd "$(pwd)"
              pm2 save
            fi

            echo "✅ Backend DEV deployed → api.dev.redber.in (port 7090)"

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Frontend → dev.redber.in (port 7000)
  # ─────────────────────────────────────────────────────────────
  deploy-frontend:
    name: ⚡ Frontend → dev.redber.in
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: 🚀 Deploy frontend via SSH (as root)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            SITE_USER="redber-dev"
            APP_DIR="/home/$SITE_USER/htdocs/dev.redber.in"

            echo "📦 Cloning or updating repo (dev branch)..."
            mkdir -p "$APP_DIR"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone -b dev https://github.com/${{ github.repository }}.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin dev
            git reset --hard origin/dev
            chown -R "$SITE_USER:$SITE_USER" "$APP_DIR"

            echo "📦 Installing Node dependencies..."
            cd frontend
            sudo -u "$SITE_USER" npm ci --prefer-offline -q

            echo "🏗️  Building Next.js (API → https://api.dev.redber.in)..."
            sudo -u "$SITE_USER" bash -c "NEXT_PUBLIC_API_URL=https://api.dev.redber.in npm run build"

            echo "♻️  Restarting frontend (port 7000)..."
            if pm2 list | grep -q "redber-frontend-dev"; then
              pm2 restart redber-frontend-dev
            else
              pm2 start "npm run start" \
                --name redber-frontend-dev \
                --cwd "$(pwd)" \
                --env PORT=7000
              pm2 save
            fi

            echo "✅ Frontend DEV deployed → dev.redber.in (port 7000)"
