name: 🧪 Deploy to DEV (dev.redber.in)

on:
  push:
    branches: [dev]
  workflow_dispatch:                # allow manual trigger from GitHub UI

# Cancel any in-progress deployment on the same branch
concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Backend → api.dev.redber.in
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: 🐍 Backend → api.dev.redber.in
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 SSH into VPS and deploy backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.CP_BACKEND_DEV_USER }}   # CloudPanel site user for api.dev.redber.in
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            APP_DIR="/home/${{ secrets.CP_BACKEND_DEV_USER }}/htdocs/api.dev.redber.in"
            cd "$APP_DIR"

            echo "📦 Pulling latest code from dev branch..."
            if [ ! -d ".git" ]; then
              git clone -b dev https://github.com/${{ github.repository }}.git .
            else
              git fetch origin dev
              git reset --hard origin/dev
            fi

            echo "🐍 Installing Python deps..."
            cd backend
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip -q
            pip install -r requirements.txt -q

            echo "🔑 Writing .env for DEV..."
            cat > .env << 'EOF'
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            DEEPGRAM_API_KEY=${{ secrets.DEEPGRAM_API_KEY }}
            FIREBASE_SERVICE_ACCOUNT=${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
            EOF

            echo "♻️  Restarting backend via PM2..."
            if pm2 list | grep -q redber-backend-dev; then
              pm2 restart redber-backend-dev
            else
              pm2 start "venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 7090" \
                --name redber-backend-dev \
                --cwd "$(pwd)"
              pm2 save
            fi

            echo "✅ Backend DEV deployed to api.dev.redber.in"

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Frontend → dev.redber.in (runs after backend)
  # ─────────────────────────────────────────────────────────────
  deploy-frontend:
    name: ⚡ Frontend → dev.redber.in
    runs-on: ubuntu-latest
    needs: deploy-backend           # ensure backend is up before FE build

    steps:
      - name: 🚀 SSH into VPS and deploy frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.CP_FRONTEND_DEV_USER }}  # CloudPanel site user for dev.redber.in
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            APP_DIR="/home/${{ secrets.CP_FRONTEND_DEV_USER }}/htdocs/dev.redber.in"
            cd "$APP_DIR"

            echo "📦 Pulling latest code from dev branch..."
            if [ ! -d ".git" ]; then
              git clone -b dev https://github.com/${{ github.repository }}.git .
            else
              git fetch origin dev
              git reset --hard origin/dev
            fi

            echo "📦 Installing Node dependencies..."
            cd frontend
            npm ci --prefer-offline -q

            echo "🏗️  Building Next.js for DEV environment..."
            NEXT_PUBLIC_API_URL=https://api.dev.redber.in npm run build

            echo "♻️  Restarting frontend via PM2..."
            if pm2 list | grep -q redber-frontend-dev; then
              pm2 restart redber-frontend-dev
            else
              PORT=7000 pm2 start "npm run start" \
                --name redber-frontend-dev \
                --cwd "$(pwd)"
              pm2 save
            fi

            echo "✅ Frontend DEV deployed to dev.redber.in"
